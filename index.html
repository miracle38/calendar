<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지란지교소프트 품질관리팀 2026년 4월 일정표</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 24px;
        }

        .calendar {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden;
            max-width: 1600px;
            margin: 0 auto;
        }

        .calendar-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calendar-header h1 { font-size: 1.6em; font-weight: 700; }
        .calendar-header p { font-size: 0.95em; opacity: 0.85; }

        .toolbar {
            display: flex;
            gap: 8px;
        }

        .toolbar button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        .toolbar button:hover { background: rgba(255,255,255,0.35); }

        .calendar-body { padding: 12px; }

        /* 요일 헤더 */
        .weekdays {
            display: grid;
            grid-template-columns: 0.3fr 1fr 1fr 1fr 1fr 1fr 0.3fr;
            text-align: center;
            font-weight: 700;
            font-size: 0.85em;
            border-bottom: 2px solid #eee;
        }

        .weekdays span {
            padding: 14px 0;
            color: #333;
            font-size: 1.1em;
            font-weight: 800;
        }

        .weekdays span:first-child { color: #e74c3c; }
        .weekdays span:last-child { color: #3498db; }

        /* 날짜 그리드 */
        .days {
            display: grid;
            grid-template-columns: 0.3fr 1fr 1fr 1fr 1fr 1fr 0.3fr;
        }

        .day {
            min-height: 165px;
            border: 1px solid #f0f0f0;
            padding: 6px 8px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }

        .day:hover:not(.empty) { background: #fafaff; }
        .day.empty { cursor: default; background: #fafafa; }

        .day.sunday, .day.saturday {
            background: #f8f8f8;
            min-height: 80px;
        }

        .day.sunday .date-row, .day.saturday .date-row {
            justify-content: center;
        }

        .day.sunday .event-tag, .day.saturday .event-tag {
            font-size: 0.65em;
            padding: 2px 5px;
        }

        .day .date-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            gap: 4px;
        }

        .day .date-number {
            display: inline-block;
            font-weight: 800;
            font-size: 1.15em;
            width: 34px;
            height: 34px;
            line-height: 34px;
            text-align: center;
            border-radius: 50%;
            flex-shrink: 0;
            color: #333;
        }

        .day.holiday .date-number { color: #e74c3c !important; }

        .day .holiday-name {
            font-size: 0.65em;
            color: #e74c3c;
            font-weight: 700;
            white-space: nowrap;
        }

        .day .leave-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            overflow: hidden;
        }

        .day .leave-tag {
            font-size: 0.6em;
            padding: 1px 6px;
            border-radius: 3px;
            background: #ffe0e6;
            color: #d63031;
            font-weight: 600;
            white-space: nowrap;
        }

        .day.sunday .date-number { color: #e74c3c; }
        .day.saturday .date-number { color: #3498db; }

        .day.today .date-number {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff !important;
        }

        /* 일정 색상 */
        .event-colors { --c1: #1d4ed8; --c2: #15803d; --c3: #be185d; }

        .day .event-tag {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78em;
            padding: 4px 7px;
            border-radius: 4px;
            margin-bottom: 5px;
            color: #fff;
            font-weight: 500;
            line-height: 1.2;
            cursor: grab;
        }

        .day .event-tag:active { cursor: grabbing; }
        .day .event-tag.dragging { opacity: 0.4; }

        .day.drag-over:not(.empty) {
            background: #e8eeff !important;
            box-shadow: inset 0 0 0 2px #1e3c72;
        }

        .drag-hint {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,60,114,0.9); color: #fff;
            padding: 8px 20px; border-radius: 8px; font-size: 0.85em;
            font-weight: 600; z-index: 200; pointer-events: none;
            display: none;
        }

        .drag-hint.active { display: block; }

        .day .event-tag .tag-text {
            flex: 1;
            white-space: pre-line;
            word-break: break-word;
        }

        .day .event-tag.c0 { background: var(--c1); }
        .day .event-tag.c1 { background: var(--c2); }
        .day .event-tag.c2 { background: var(--c3); }

        .day .event-more-tag {
            font-size: 0.7em;
            color: #888;
            padding: 2px 4px;
            font-weight: 600;
        }

        /* 모달 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            justify-content: center; align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #fff;
            border-radius: 16px;
            width: 94%;
            max-width: 720px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff; padding: 18px 22px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .modal-header h2 { font-size: 1.15em; }

        .modal-close {
            background: none; border: none; color: #fff;
            font-size: 1.5em; cursor: pointer; opacity: 0.8;
        }

        .modal-close:hover { opacity: 1; }
        .modal-body { padding: 18px 22px; }

        .event-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

        .event-form textarea {
            width: 100%; padding: 14px 16px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 1.05em; font-family: inherit; outline: none;
            resize: vertical; min-height: 80px; max-height: 200px;
            line-height: 1.5;
        }

        .event-form textarea:focus { border-color: #1e3c72; }

        .color-picker {
            display: flex; gap: 6px; align-items: center;
        }

        .color-dot {
            padding: 6px 14px; border-radius: 8px;
            border: 2px solid transparent; cursor: pointer;
            font-size: 0.8em; font-weight: 600; color: #fff;
            transition: border-color 0.2s, opacity 0.2s;
            opacity: 0.6;
        }

        .color-dot:hover { opacity: 0.85; }
        .color-dot.selected { border-color: #333; opacity: 1; }
        .color-dot.cd0 { background: var(--c1); }
        .color-dot.cd1 { background: var(--c2); }
        .color-dot.cd2 { background: var(--c3); }

        .event-form .btn-add {
            align-self: flex-end;
            padding: 10px 28px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff; border: none; border-radius: 10px;
            font-size: 0.95em; font-weight: 600; cursor: pointer;
            font-family: inherit;
        }

        .event-form .btn-add:hover { opacity: 0.9; }

        .event-list { list-style: none; max-height: 280px; overflow-y: auto; }

        .event-list li {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 10px;
            margin-bottom: 6px; background: #f8f8ff;
        }

        .event-list li:hover { background: #eef0ff; }

        .event-list li .li-color {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }

        .event-list li .li-color.c0 { background: var(--c1); }
        .event-list li .li-color.c1 { background: var(--c2); }
        .event-list li .li-color.c2 { background: var(--c3); }

        .event-list li span { flex: 1; font-size: 1em; white-space: pre-line; line-height: 1.3; cursor: pointer; }
        .event-list li span:hover { text-decoration: underline; }

        .edit-input {
            flex: 1; padding: 6px 10px;
            border: 2px solid #1e3c72; border-radius: 8px;
            font-size: 0.95em; font-family: inherit; outline: none;
            resize: vertical; min-height: 32px; max-height: 100px;
            line-height: 1.4;
        }

        .status-label {
            font-size: 0.65em; padding: 2px 6px; border-radius: 3px;
            font-weight: 700; flex-shrink: 0; white-space: nowrap;
        }

        .status-label.done { background: #dbeafe; color: #2563eb; }
        .status-label.final { background: #dcfce7; color: #16a34a; }

        .status-btns { display: flex; gap: 4px; flex-shrink: 0; }

        .status-btn {
            background: #f0f0f0; border: 1.5px solid transparent; color: #999;
            font-size: 0.7em; padding: 2px 7px; border-radius: 5px;
            cursor: pointer; font-weight: 600; font-family: inherit;
            transition: all 0.15s;
        }

        .status-btn:hover { background: #e8e8e8; }
        .status-btn.active-done { background: #dbeafe; color: #2563eb; border-color: #2563eb; }
        .status-btn.active-final { background: #dcfce7; color: #16a34a; border-color: #16a34a; }

        .day .event-tag .tag-status {
            font-size: 0.8em; padding: 1px 4px;
            border-radius: 3px; margin-left: 4px; font-weight: 700;
            flex-shrink: 0; white-space: nowrap;
        }

        .tag-status.done { background: #fbbf24; color: #333; }
        .tag-status.final { background: #f43f5e; color: #fff; }

        .event-delete {
            background: none; border: none; color: #e74c3c;
            font-size: 1.1em; cursor: pointer; opacity: 0.5; padding: 2px 6px;
        }

        .event-delete:hover { opacity: 1; }

        .no-events { text-align: center; color: #bbb; padding: 16px; font-size: 0.9em; }

        .leave-options {
            display: flex; gap: 8px; margin-bottom: 10px;
        }

        .leave-btn {
            padding: 6px 14px; border-radius: 8px; font-size: 0.82em;
            font-weight: 600; cursor: pointer; border: 2px solid transparent;
            font-family: inherit; transition: all 0.15s;
        }

        .leave-btn.off { opacity: 0.45; }

        .leave-btn.type-vacation { background: #ffe0e6; color: #d63031; }
        .leave-btn.type-vacation.on { border-color: #d63031; }
        .leave-btn.type-am { background: #e0f0ff; color: #0984e3; }
        .leave-btn.type-am.on { border-color: #0984e3; }
        .leave-btn.type-pm { background: #e8f5e9; color: #27ae60; }
        .leave-btn.type-pm.on { border-color: #27ae60; }

        .day .leave-tag.vacation { background: #ffe0e6; color: #d63031; }
        .day .leave-tag.am { background: #e0f0ff; color: #0984e3; }
        .day .leave-tag.pm { background: #e8f5e9; color: #27ae60; }

        .event-list li .li-leave {
            font-size: 0.7em;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .li-leave.vacation { background: #ffe0e6; color: #d63031; }
        .li-leave.am { background: #e0f0ff; color: #0984e3; }
        .li-leave.pm { background: #e8f5e9; color: #27ae60; }

        #memberSelect {
            flex: 1; padding: 10px 14px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 0.95em; font-family: inherit; outline: none;
            background: #fff; cursor: pointer;
        }

        #memberSelect:focus { border-color: #1e3c72; }

        .footer {
            text-align: center; padding: 12px 20px 16px;
            color: #aaa; font-size: 0.8em; border-top: 1px solid #f0f0f0;
        }

        /* 태블릿 */
        @media (max-width: 1024px) {
            body { padding: 12px; }
            .calendar-header { padding: 16px 20px; flex-direction: column; gap: 10px; align-items: flex-start; }
            .calendar-header h1 { font-size: 1.3em; }
            .toolbar { flex-wrap: wrap; }
            .toolbar button { padding: 6px 12px; font-size: 0.8em; }
            .day { min-height: 120px; padding: 4px 5px; }
            .day .date-number { font-size: 1em; width: 28px; height: 28px; line-height: 28px; }
            .day .event-tag { font-size: 0.7em; padding: 3px 5px; margin-bottom: 3px; }
            .weekdays span { font-size: 0.95em; padding: 10px 0; }
        }

        /* 모바일 */
        @media (max-width: 640px) {
            body { padding: 6px; }
            .calendar { border-radius: 10px; }
            .calendar-header { padding: 12px 14px; }
            .calendar-header h1 { font-size: 1.1em; }
            .calendar-header p { font-size: 0.8em; }
            .toolbar button { padding: 5px 10px; font-size: 0.75em; }
            .calendar-body { padding: 4px; }
            .weekdays { grid-template-columns: 0.4fr 1fr 1fr 1fr 1fr 1fr 0.4fr; }
            .weekdays span { font-size: 0.8em; padding: 8px 0; }
            .days { grid-template-columns: 0.4fr 1fr 1fr 1fr 1fr 1fr 0.4fr; }
            .day { min-height: 80px; padding: 3px 3px; }
            .day.sunday, .day.saturday { min-height: 50px; }
            .day .date-number { font-size: 0.85em; width: 24px; height: 24px; line-height: 24px; }
            .day .event-tag { font-size: 0.6em; padding: 2px 4px; margin-bottom: 2px; line-height: 1; }
            .day .event-tag .tag-status { font-size: 0.7em; padding: 1px 3px; }
            .day .leave-tag { font-size: 0.5em; padding: 1px 4px; }
            .day .date-row { margin-bottom: 2px; gap: 2px; }
            .modal { width: 96%; max-width: 100%; }
            .modal-body { padding: 12px 14px; }
            .color-picker { flex-wrap: wrap; }
            .color-dot { font-size: 0.7em; padding: 5px 10px; }
            .footer { font-size: 0.7em; }
        }

        @media print {
            body { background: #fff; padding: 0; }
            .calendar { box-shadow: none; max-width: 100%; }
            .toolbar { display: none; }
            .day { min-height: 90px; }
            .day:hover { background: none !important; }
        }
    </style>
</head>
<body class="event-colors">
    <div class="drag-hint" id="dragHint">드래그: 이동 · Ctrl+드래그: 복사</div>
    <div class="calendar">
        <div class="calendar-header">
            <div>
                <h1 id="calTitle">지란지교소프트 품질관리팀 2026년 4월 일정표</h1>
                <p id="calSubtitle">Quality Management Team · April 2026</p>
            </div>
            <div class="toolbar">
                <button onclick="prevMonth()">◀ 이전</button>
                <button onclick="nextMonth()">다음 ▶</button>
                <button onclick="goToday()">오늘</button>
                <button onclick="copyAsHTML()">게시판 복사</button>
                <button onclick="exportJSON()">내보내기</button>
                <button onclick="document.getElementById('importFile').click()">불러오기</button>
                <button onclick="window.print()">인쇄</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
            </div>
        </div>
        <div class="calendar-body">
            <div class="weekdays">
                <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div class="days" id="calendarDays"></div>
        </div>
        <div class="footer">품질관리팀 Calendar</div>
    </div>

    <!-- 모달 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">4월 1일</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="color-picker" id="colorPicker"></div>
                <div class="leave-options" style="margin-top:10px;">
                    <button class="leave-btn type-vacation off" onclick="toggleLeave('vacation')">휴가</button>
                    <button class="leave-btn type-am off" onclick="toggleLeave('am')">오전반차</button>
                    <button class="leave-btn type-pm off" onclick="toggleLeave('pm')">오후반차</button>
                </div>
                <div class="leave-form" id="leaveForm" style="display:none; margin-bottom:14px;">
                    <div style="display:flex; gap:8px;">
                        <select id="memberSelect">
                            <option value="">팀원 선택</option>
                            <option value="김해성">김해성</option>
                            <option value="원교현">원교현</option>
                            <option value="신주영">신주영</option>
                            <option value="김창희">김창희</option>
                            <option value="최선빈">최선빈</option>
                            <option value="권서연">권서연</option>
                        </select>
                        <button class="btn-add" onclick="addLeave()">추가</button>
                    </div>
                </div>
                <div class="event-form" id="eventForm">
                    <textarea id="eventInput" placeholder="일정을 입력하세요 (Shift+Enter로 줄바꿈)" rows="1"></textarea>
                    <button class="btn-add" onclick="addEvent()">추가</button>
                </div>
                <ul class="event-list" id="eventList"></ul>
            </div>
        </div>
    </div>

        function getHoliday(year, month, day) {
            return HOLIDAYS[`${year}-${month}-${day}`] || null;
        }

        let currentYear = 2026;
        let currentMonth = 4;
        let selectedDay = null;
        let selectedColor = 0;
        let selectedLeave = null;
        const COLOR_NAMES = ['지란지교 소프트', '지란지교 데이터', '기타'];
        const LEAVE_LABELS = { vacation: '휴가', am: '오전반차', pm: '오후반차' };
        const MAX_VISIBLE = 6;

        function storageKey() {
            return `khs_calendar_${currentYear}_${String(currentMonth).padStart(2,'0')}`;
        }

        let events = JSON.parse(localStorage.getItem(storageKey()) || '{}');

        function saveEvents() {
            localStorage.setItem(storageKey(), JSON.stringify(events));
        }

        function loadEvents() {
            events = JSON.parse(localStorage.getItem(storageKey()) || '{}');
        }

        function updateHeader() {
            document.getElementById('calTitle').textContent = `지란지교소프트 품질관리팀 ${currentYear}년 ${currentMonth}월 일정표`;
            document.getElementById('calSubtitle').textContent = `Quality Management Team · ${MONTH_NAMES_EN[currentMonth - 1]} ${currentYear}`;
            document.title = `지란지교소프트 품질관리팀 ${currentYear}년 ${currentMonth}월 일정표`;
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            if (currentYear < 2026 || (currentYear === 2026 && currentMonth < 1)) { currentYear = 2026; currentMonth = 1; return; }
            loadEvents(); updateHeader(); renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            if (currentYear > 2040) { currentYear = 2040; currentMonth = 12; return; }
            loadEvents(); updateHeader(); renderCalendar();
        }

        function goToday() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth() + 1;
            if (currentYear < 2026) { currentYear = 2026; currentMonth = 1; }
            if (currentYear > 2030) { currentYear = 2030; currentMonth = 12; }
            loadEvents(); updateHeader(); renderCalendar();
        }

        function renderCalendar() {
            const c = document.getElementById('calendarDays');
            c.innerHTML = '';
            const startOffset = new Date(currentYear, currentMonth - 1, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth, 0).getDate();
            const today = new Date();
            const isThisMonth = (today.getFullYear() === currentYear && today.getMonth() + 1 === currentMonth);

            for (let i = 0; i < startOffset; i++) {
                c.innerHTML += '<div class="day empty"></div>';
            }

            for (let d = 1; d <= totalDays; d++) {
                const dow = (startOffset + d - 1) % 7;
                let cls = 'day';
                if (dow === 0) cls += ' sunday';
                if (dow === 6) cls += ' saturday';
                if (isThisMonth && d === today.getDate()) cls += ' today';

                const holiday = getHoliday(currentYear, currentMonth, d);
                if (holiday) cls += ' holiday';

                const dayEv = events[d] || [];
                const leaves = dayEv.filter(ev => typeof ev === 'object' && ev.leave);
                const normal = dayEv.filter(ev => !(typeof ev === 'object' && ev.leave))
                    .sort((a, b) => ((typeof a === 'object' ? a.color : 0) || 0) - ((typeof b === 'object' ? b.color : 0) || 0));

                let holidayHtml = holiday ? `<span class="holiday-name">${holiday}</span>` : '';
                let leaveHtml = '';
                if (leaves.length > 0) {
                    leaveHtml = '<div class="leave-tags">' + leaves.map(ev => {
                        const lt = ev.leaveType || 'vacation';
                        return `<span class="leave-tag ${lt}">${LEAVE_LABELS[lt]}: ${ev.text}</span>`;
                    }).join('') + '</div>';
                }

                let evHtml = '';
                const show = normal.slice(0, MAX_VISIBLE);
                show.forEach(ev => {
                    const ci = typeof ev === 'object' ? (ev.color || 0) : 0;
                    const text = typeof ev === 'object' ? ev.text : ev;
                    const st = typeof ev === 'object' ? ev.status : null;
                    let stHtml = '';
                    if (st === 'done') stHtml = '<span class="tag-status done">완료</span>';
                    else if (st === 'final') stHtml = '<span class="tag-status final">최종</span>';
                    const evIdx = dayEv.indexOf(ev);
                    evHtml += `<div class="event-tag c${ci % 3}" draggable="true" data-from="${d}" data-idx="${evIdx}" title="${text}"><span class="tag-text">${text}</span>${stHtml}</div>`;
                });
                if (normal.length > MAX_VISIBLE) {
                    evHtml += `<div class="event-more-tag">+${normal.length - MAX_VISIBLE}개 더</div>`;
                }

                c.innerHTML += `<div class="${cls}" data-day="${d}" onclick="openModal(${d})"><div class="date-row"><span class="date-number">${d}</span>${holidayHtml}${leaveHtml}</div>${evHtml}</div>`;
            }

            const rem = (7 - (startOffset + totalDays) % 7) % 7;
            for (let i = 0; i < rem; i++) {
                c.innerHTML += '<div class="day empty"></div>';
            }
        }

        function renderColorPicker() {
            const cp = document.getElementById('colorPicker');
            cp.innerHTML = COLOR_NAMES.map((name, i) =>
                `<div class="color-dot cd${i} ${i === selectedColor ? 'selected' : ''}" onclick="pickColor(${i})">${name}</div>`
            ).join('');
        }

        function pickColor(i) {
            selectedColor = i;
            renderColorPicker();
        }

        function toggleLeave(type) {
            selectedLeave = selectedLeave === type ? null : type;
            document.querySelectorAll('.leave-btn').forEach(btn => {
                btn.classList.remove('on');
                btn.classList.add('off');
            });
            if (selectedLeave) {
                document.querySelector(`.leave-btn.type-${selectedLeave}`).classList.remove('off');
                document.querySelector(`.leave-btn.type-${selectedLeave}`).classList.add('on');
            }
            document.getElementById('leaveForm').style.display = selectedLeave ? 'block' : 'none';
            document.getElementById('eventForm').style.display = selectedLeave ? 'none' : 'flex';
            if (selectedLeave) document.getElementById('memberSelect').value = '';
        }

        function openModal(day) {
            selectedDay = day;
            selectedColor = 0;
            selectedLeave = null;
            const dowNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dow = new Date(currentYear, currentMonth - 1, day).getDay();
            document.getElementById('modalTitle').textContent = `${currentMonth}월 ${day}일 (${dowNames[dow]})`;
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('eventInput').value = '';
            document.querySelectorAll('.leave-btn').forEach(btn => { btn.classList.remove('on'); btn.classList.add('off'); });
            document.getElementById('leaveForm').style.display = 'none';
            document.getElementById('eventForm').style.display = 'flex';
            document.getElementById('memberSelect').value = '';
            renderColorPicker();
            renderEventList();
            setTimeout(() => document.getElementById('eventInput').focus(), 100);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            selectedDay = null;
        }

        function renderEventList() {
            const list = document.getElementById('eventList');
            const dayEv = events[selectedDay] || [];
            if (dayEv.length === 0) {
                list.innerHTML = '<div class="no-events">등록된 일정이 없습니다</div>';
                return;
            }
            list.innerHTML = dayEv.map((ev, i) => {
                const ci = typeof ev === 'object' ? (ev.color || 0) : 0;
                const text = typeof ev === 'object' ? ev.text : ev;
                const isLeave = typeof ev === 'object' && ev.leave;
                const lt = (typeof ev === 'object' && ev.leaveType) || 'vacation';
                const st = (typeof ev === 'object' && ev.status) || null;
                const leaveLabel = isLeave ? `<span class="li-leave ${lt}">${LEAVE_LABELS[lt]}</span>` : '';
                const colorDot = isLeave ? '' : `<div class="li-color c${ci % 3}"></div>`;
                const stLabel = st ? `<span class="status-label ${st}">${st === 'done' ? '완료' : '최종 완료'}</span>` : '';
                const doneActive = st === 'done' ? ' active-done' : '';
                const finalActive = st === 'final' ? ' active-final' : '';
                const statusBtns = `<div class="status-btns"><button class="status-btn${doneActive}" onclick="toggleStatus(${i},'done')">완료</button><button class="status-btn${finalActive}" onclick="toggleStatus(${i},'final')">최종</button></div>`;
                return `<li>${colorDot}${leaveLabel}<span onclick="editEvent(${i})">${text}</span>${stLabel}${statusBtns}<button class="event-delete" onclick="deleteEvent(${i})">&#10005;</button></li>`;
            }).join('');
        }

        function addLeave() {
            const select = document.getElementById('memberSelect');
            const name = select.value;
            if (!name || selectedDay === null || !selectedLeave) return;
            if (!events[selectedDay]) events[selectedDay] = [];
            events[selectedDay].push({ text: name, leave: true, leaveType: selectedLeave });
            saveEvents();
            select.value = '';
            renderEventList();
            renderCalendar();
        }

        function addEvent() {
            const input = document.getElementById('eventInput');
            const text = input.value.trim();
            if (!text || selectedDay === null) return;
            if (!events[selectedDay]) events[selectedDay] = [];
            events[selectedDay].push({ text, color: selectedColor });
            saveEvents();
            input.value = '';
            input.focus();
            renderEventList();
            renderCalendar();
        }

        function editEvent(index) {
            if (selectedDay === null) return;
            const ev = events[selectedDay][index];
            const text = typeof ev === 'object' ? ev.text : ev;
            const li = document.getElementById('eventList').children[index];
            const span = li.querySelector('span');
            const textarea = document.createElement('textarea');
            textarea.className = 'edit-input';
            textarea.value = text;
            span.replaceWith(textarea);
            textarea.focus();

            function save() {
                const newText = textarea.value.trim();
                if (newText && typeof ev === 'object') {
                    ev.text = newText;
                } else if (newText) {
                    events[selectedDay][index] = newText;
                }
                saveEvents();
                renderEventList();
                renderCalendar();
            }

            textarea.addEventListener('blur', save);
            textarea.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); textarea.blur(); }
                if (e.key === 'Escape') { renderEventList(); }
            });
        }

        function toggleStatus(index, type) {
            if (selectedDay === null) return;
            const ev = events[selectedDay][index];
            if (typeof ev === 'object') {
                ev.status = ev.status === type ? null : type;
            }
            saveEvents();
            renderEventList();
            renderCalendar();
        }

        function deleteEvent(index) {
            if (selectedDay === null) return;
            events[selectedDay].splice(index, 1);
            if (events[selectedDay].length === 0) delete events[selectedDay];
            saveEvents();
            renderEventList();
            renderCalendar();
        }

        // 게시판 복사용 - 반응형 HTML 테이블 생성

            html += `<tr><td colspan="7" style="background:#1e3c72;color:#fff;padding:16px 20px;font-size:18px;font-weight:700;">지란지교소프트 품질관리팀 ${currentYear}년 ${currentMonth}월 일정표<br><span style="font-size:12px;font-weight:400;opacity:0.85;">Quality Management Team · ${MONTH_NAMES_EN[currentMonth - 1]} ${currentYear}</span></td></tr>`;

            });
            html += '</tr>';

            // 날짜 셀 생성
            let cells = [];
            for (let i = 0; i < startOffset; i++) {
                cells.push({ html: '&nbsp;', dow: i, empty: true });
            }

            for (let d = 1; d <= totalDays; d++) {

                const normal = dayEv.filter(ev => !(typeof ev === 'object' && ev.leave))
                    .sort((a, b) => ((typeof a === 'object' ? a.color : 0) || 0) - ((typeof b === 'object' ? b.color : 0) || 0));

                const holiday = getHoliday(currentYear, currentMonth, d);
                const dateColor = holiday ? '#e74c3c' : dayColors[dow];
                const dateAlign = (dow === 0 || dow === 6) ? 'justify-content:center;' : '';
                let holidayTagHtml = holiday ? `<span style="font-size:11px;color:#e74c3c;font-weight:700;white-space:nowrap;">${holiday}</span>` : '';
                let leaveTagsHtml = '';
                leaves.forEach(ev => {
                    const lt = ev.leaveType || 'vacation';
                    const lc = leaveColors[lt];
                    const label = LEAVE_LABELS[lt];
                    leaveTagsHtml += `<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:${lc.bg};color:${lc.color};font-weight:600;white-space:nowrap;">${label}: ${ev.text}</span>`;
                });
                let cell = `<div style="display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap;${dateAlign}"><span style="font-weight:800;font-size:18px;color:${dateColor};">${d}</span>${holidayTagHtml}${leaveTagsHtml}</div>`;

                // 일정
                normal.forEach(ev => {
                    const ci = typeof ev === 'object' ? (ev.color || 0) : 0;
                    const text = (typeof ev === 'object' ? ev.text : ev).replace(/\n/g, '<br>');
                    const st = typeof ev === 'object' ? ev.status : null;
                    let stHtml = '';
                    if (st === 'done') stHtml = ` <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:${statusColors.done.bg};color:${statusColors.done.color};font-weight:700;">완료</span>`;
                    else if (st === 'final') stHtml = ` <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:${statusColors.final.bg};color:${statusColors.final.color};font-weight:700;">최종</span>`;
                    cell += `<div style="font-size:12px;padding:4px 7px;border-radius:4px;margin-bottom:5px;color:#fff;font-weight:500;background:${colors[ci % 3]};line-height:1.3;">${text}${stHtml}</div>`;
                });

                cells.push({ html: cell, dow, empty: false });
            }

            const rem = (7 - cells.length % 7) % 7;
            for (let i = 0; i < rem; i++) {
                cells.push({ html: '&nbsp;', dow: (cells.length) % 7, empty: true });
            }

            // 테이블 행 출력
            for (let i = 0; i < cells.length; i++) {
                if (i % 7 === 0) html += '<tr>';
                const c = cells[i];
                const isWeekend = (c.dow === 0 || c.dow === 6);
                const bg = c.empty ? '#fafafa' : (isWeekend ? '#f8f8f8' : '#fff');
                const w = isWeekend ? narrowW : wideW;
                html += `<td width="${w}" style="border:1px solid #d0d0d0;vertical-align:top;padding:6px;height:${isWeekend ? '60px' : '120px'};background:${bg};">${c.html}</td>`;
                if (i % 7 === 6) html += '</tr>';
            }

            // 푸터
            html += `<tr><td colspan="7" style="border:1px solid #d0d0d0;text-align:center;padding:10px;color:#aaa;font-size:11px;">지란지교소프트 품질관리팀 Calendar</td></tr>`;
            html += '</table>';

            const blob = new Blob([html], { type: 'text/html' });
            const item = new ClipboardItem({ 'text/html': blob });
            navigator.clipboard.write([item]).then(() => {
                alert('클립보드에 복사되었습니다. 게시판에 Ctrl+V로 붙여넣기 하세요.');
            }).catch(() => {
                const w = window.open('', '_blank', 'width=900,height=700');
                w.document.write(html);
                w.document.close();
            });
        }

        // 내보내기 (JSON 파일 다운로드)
        function exportJSON() {
            const blob = new Blob([JSON.stringify(events, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `calendar_${currentYear}_${String(currentMonth).padStart(2,'0')}.json`;
            a.click();
        }

        // 불러오기 (JSON 파일)
        function importJSON(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    events = data;
                    saveEvents();
                    renderCalendar();
                    alert('일정을 불러왔습니다.');
                } catch {
                    alert('올바른 JSON 파일이 아닙니다.');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }


        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // 드래그 앤 드롭
        const calDays = document.getElementById('calendarDays');
        const dragHint = document.getElementById('dragHint');

        calDays.addEventListener('dragstart', function(e) {
            const tag = e.target.closest('.event-tag');
            if (!tag) return;
            tag.classList.add('dragging');
            e.dataTransfer.setData('text/plain', JSON.stringify({
                from: tag.dataset.from,
                idx: parseInt(tag.dataset.idx)
            }));
            dragHint.classList.add('active');
        });

        calDays.addEventListener('dragend', function(e) {
            const tag = e.target.closest('.event-tag');
            if (tag) tag.classList.remove('dragging');
            document.querySelectorAll('.day.drag-over').forEach(el => el.classList.remove('drag-over'));
            dragHint.classList.remove('active');
        });

        calDays.addEventListener('dragover', function(e) {
            const day = e.target.closest('.day:not(.empty)');
            if (!day) return;
            e.preventDefault();
            document.querySelectorAll('.day.drag-over').forEach(el => el.classList.remove('drag-over'));
            day.classList.add('drag-over');
        });

        calDays.addEventListener('dragleave', function(e) {
            const day = e.target.closest('.day');
            if (day) day.classList.remove('drag-over');
        });

        calDays.addEventListener('drop', function(e) {
            e.preventDefault();
            document.querySelectorAll('.day.drag-over').forEach(el => el.classList.remove('drag-over'));
            dragHint.classList.remove('active');

            const day = e.target.closest('.day:not(.empty)');
            if (!day) return;
            const toDay = day.dataset.day;

            try {
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                const fromDay = data.from;
                const idx = data.idx;
                if (!events[fromDay] || !events[fromDay][idx]) return;
                if (fromDay === toDay) return;

                const evCopy = JSON.parse(JSON.stringify(events[fromDay][idx]));
                if (!events[toDay]) events[toDay] = [];
                events[toDay].push(evCopy);

                // Ctrl 누르면 복사, 아니면 이동
                if (!e.ctrlKey) {
                    events[fromDay].splice(idx, 1);
                    if (events[fromDay].length === 0) delete events[fromDay];
                }

                saveEvents();
                renderCalendar();
            } catch {}
        });

        updateHeader();
        renderCalendar();
    </script>
</body>
</html>
