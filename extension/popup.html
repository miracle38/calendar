<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>연차 동기화</title>
<style>
    body { font-family: 'Malgun Gothic', sans-serif; width: 280px; margin: 0; padding: 14px; background: #fff; color: #333; }
    h1 { font-size: 14px; margin: 0 0 12px; color: #1e3c72; }
    .row { margin: 8px 0; }
    label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
    input[type=email], input[type=password] {
        width: 100%; box-sizing: border-box;
        padding: 6px 8px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px;
    }
    button {
        width: 100%; padding: 7px; font-size: 12px; font-weight: 700;
        border: none; border-radius: 4px; cursor: pointer;
        background: #1e3c72; color: #fff;
    }
    button:hover { background: #2a5298; }
    button:disabled { background: #999; cursor: not-allowed; }
    button.secondary { background: #eee; color: #333; }
    button.secondary:hover { background: #ddd; }
    .status { font-size: 11px; margin-top: 10px; padding: 8px; border-radius: 4px; }
    .status.info { background: #e8f0fe; color: #1e3c72; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #ffebee; color: #c62828; }
    .small { font-size: 10px; color: #999; margin-top: 8px; line-height: 1.4; }
    .user { font-size: 11px; color: #555; margin-bottom: 6px; }
    .user strong { color: #1e3c72; }
    .footer { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; display: flex; gap: 6px; }
    .footer button { flex: 1; }
</style>
</head>
<body>
<h1>📅 연차 자동 동기화</h1>

<div id="loggedOut" style="display:none;">
    <div class="row">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="miracle0938@gmail.com">
    </div>
    <div class="row">
        <label for="password">비밀번호</label>
        <input type="password" id="password">
    </div>
    <button id="loginBtn">로그인</button>
    <div class="small">캘린더와 동일한 Firebase 계정으로 로그인하세요. 토큰만 저장되며 비밀번호는 저장되지 않습니다.</div>
</div>

<div id="loggedIn" style="display:none;">
    <div class="user">계정: <strong id="userEmail"></strong></div>
    <div class="row">
        <button id="syncBtn">지금 동기화</button>
    </div>
    <div id="syncStatus" class="status info">최근 동기화: 정보 없음</div>
    <div class="footer">
        <button id="logoutBtn" class="secondary">로그아웃</button>
    </div>
    <div class="small">그룹웨어 페이지에 들어갈 때마다 자동으로 동기화됩니다 (1시간 스로틀). 알람으로 1시간마다 시도합니다.</div>
</div>

<div id="bootStatus" class="status info">로딩 중...</div>

<script src="common.js"></script>
<script src="popup.js"></script>
</body>
</html>
